# Render Blueprint for Email-to-Sheets Agent
# Deploy with: render blueprint apply
# n8n triggers POST /process every 5 minutes

services:
  - type: web
    name: email-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 --max-requests 500 --max-requests-jitter 50
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEYS
        sync: false  # Set in Render dashboard (comma-separated)
      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false  # JSON string of service account
      - key: GMAIL_TOKEN_JSON
        sync: false
      - key: GMAIL_CREDENTIALS_JSON
        sync: false
      - key: INITIAL_IMPORT
        value: "false"
    healthCheckPath: /health
